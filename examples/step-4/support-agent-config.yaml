# Tyler Agent Configuration - With Tools (Baseline for Step 4)
# This is the starting point - you'll improve it by adding purpose and notes

# Agent identity
name: "agent"  # Give your agent a friendly name!

# Model configuration
model_name: "openai/deepseek-ai/DeepSeek-V4-Pro"  # Which LLM to use via W&B Inference

# Agent behavior
purpose: "You are a helpful AI assistant."  # Generic purpose (you'll improve this!)
notes: ""  # Operational guidelines for the agent (you'll add these!)
temperature: 0.7  # Creativity (0.0 = deterministic, 1.0 = creative)
reasoning: "low"  # How much reasoning to show (low, medium, high)
max_tool_iterations: 10  # Maximum number of tool calls per turn

# LLM API endpoint (using W&B Inference)
base_url: "https://api.inference.wandb.ai/v1"
api_key: "${WANDB_API_KEY}"

# Tools: Python functions the agent can call
tools:
  - "./tools.py"  # Path to tools.py (contains create_issue, get_issue, search_docs)

# MCP (Multi-Component Protocol): External knowledge sources
# This connects to W&B's documentation search MCP server
mcp:
  servers:
    - name: "wandb"  # Server identifier
      transport: "streamablehttp"  # HTTP-based MCP transport
      url: "https://docs.wandb.ai/mcp"  # W&B docs MCP endpoint
