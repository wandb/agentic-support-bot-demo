# Tyler Chat Configuration with Tools
# This configuration includes tools but no clear purpose yet

agent:
  name: "agent"
  model_name: "gpt-4o"

temperature: 0.7
max_tool_iterations: 10

# Tool Configuration
tools:
  - "./tools.py"

# MCP Server Configuration for documentation search
mcp:
  servers:
    mintlify:
      command: "npx"
      args: ["-y", "@mintlify/mcp-server", "https://weave-docs.wandb.ai"]

